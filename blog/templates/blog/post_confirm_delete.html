{% extends 'blog/base.html' %}

{% block content %}
<h1>Удалить пост?</h1>
<p>Вы уверены что хотите удалить: {{ post.title }}?</p>
<form method="post">
  {% csrf_token %}
  <button type="submit" class="delete">Да, удалить</button>
</form>
<p><a href="{% url 'post_list' %}">Отмена</a></p>
{% endblock %}
