{% extends 'blog/base.html' %}

{% block content %}
<h1>Вход</h1>
<form method="post" action="{% url 'login' %}">
  {% csrf_token %}
  <p><label>Логин<br><input type="text" name="username"></label></p>
  <p><label>Пароль<br><input type="password" name="password"></label></p>
  <button type="submit">Войти</button>
</form>
{% endblock %}
